# Nginx site for the Gradebook app.
# Place at /etc/nginx/sites-available/gradebook and symlink into sites-enabled.
# Replace your-domain.com with your domain, then run certbot to add HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Must be >= MAX_UPLOAD_MB so lab files can be uploaded through the proxy.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}

# After `sudo certbot --nginx -d your-domain.com -d www.your-domain.com`,
# certbot rewrites this file: adds a `listen 443 ssl` server block with the
# certificate paths and an automatic HTTP→HTTPS redirect. Nothing else to do.
